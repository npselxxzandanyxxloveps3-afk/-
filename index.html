<!DOCTYPE html>
<html>
<head>
    <title>تعاريف ايام الاسبوع</title>
</head>
<body>
    <h1>السلام عليكم اكتب ايام الاسبوع بالعربي فقط ما ابي انجليزي</h1>

    <script>
        let day = prompt('اختار يوم').trim();
        switch(day) {
            case "احد":
            case "الاحد":
            case "الأحد":
            case "اليوم الاحد":
            case "اليوم الأحد":
                document.write("الأحد اول ايام الاسبوع ويوم دوام عند الطلاب والناس غالبًا");
                break;

            case "يوم الاثنين":
            case "يوم الأثنين":
            case "الأثنين":
            case "أثنين":
            case "الاثنين":
            case "اثنين":
                document.write("الأثنين ثاني ايام الاسبوع يوم دوام ودراسي عند اغلب الطلاب والناس ويعتبر نص الاسبوع الدراسي");
                break;

            case "ثلاثاء":
            case "الثلاثاء":
            case "اليوم الثلاثاء":
                document.write("الثلاثاء ثالث ايام الاسبوع ويوم دوام عند الطلاب والناس غالبًا ويعتبر نص الاسبوع");
                break;

            case "اربعاء":
            case "الاربعاء":
            case "الأربعاء":
            case "يوم الاربعاء":
            case "يوم الأربعاء":
                document.write("الأربعاء رابع ايام الاسبوع يوم دوام ودراسي عند اغلب الطلاب والناس وقديمًا كان اخر يوم دراسي");
                break;

            case "خميس":
            case "الخميس":
            case "يوم الخميس":
                document.write("الخميس خامس ايام الاسبوع ويوم دوام عند الطلاب والناس غالبًا، ويعتبر قديمًا اجازه لكن الان دوام وهو اخر يوم الاسبوع الدراسيه");
                break;

            case "جمعة":
            case "جمعه":
            case "الجمعة":
            case "الجمعه":
            case "يوم الجمعه":
            case "يوم الجمعة":
                document.write("الجمعة سادس ايام الاسبوع يوم اجازه عند الطلاب والناس وهو يوم ديني لازم تصلي فيه على الرسول وتستغفر كثير");
                break;

            case "سبت":
            case "السبت":
            case "يوم السبت":
                document.write("السبت سابع واخر ايام الاسبوع ويوم اجازه عند الطلاب والناس كان دوام قديمًا");
                break;

            default:
                document.write("هذا مو يوم، اكتب يوم عربي فقط تبًا للانجليزيه");
        }

        document.body.style.backgroundColor = "#F5DEB3";
        document.body.style.color = "#8B4513";
        document.body.style.fontSize = "70px";
        document.body.style.textAlign = "center";
    </script>

</body>
</html>
